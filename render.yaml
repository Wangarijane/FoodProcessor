services:
  - type: web
    name: foodprocessorbackend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: foodprocessor-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: false
      - key: CORS_ALLOW_ALL_ORIGINS
        value: true

databases:
  - name: foodprocessor-db
    databaseName: foodprocessor
    user: foodprocessor
